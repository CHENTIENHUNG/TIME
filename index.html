<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>統一時間</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .wrap {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 30px 20px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    .clock {
      font-size: 72px;
      font-weight: bold;
      color: #2563eb;
      margin: 30px 0 10px;
      letter-spacing: 2px;
    }

    .status {
      color: #666;
      margin-bottom: 30px;
      min-height: 24px;
    }

    .panel {
      margin-top: 20px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 14px;
    }

    label {
      display: block;
      font-size: 18px;
      margin-bottom: 10px;
    }

    input[type="time"] {
      font-size: 24px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 16px;
      font-size: 20px;
      padding: 12px 22px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .tip {
      margin-top: 16px;
      color: #888;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .clock {
        font-size: 46px;
      }

      input[type="time"] {
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>統一時間</h1>
    <div class="clock" id="clock">--:--:--</div>
    <div class="status" id="status">正在連線資料庫...</div>

    <div class="panel">
      <label for="timeInput">輸入新時間</label>
      <input type="time" id="timeInput" step="1" />
      <br />
      <button id="updateBtn">更新統一時間</button>
      <div class="tip">
        所有人都可以修改。<br />
        修改後，所有開著此頁面的人會同步看到新時間。
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      set
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 1. 請換成你自己的 Firebase 設定
    const firebaseConfig = {
      apiKey: "你的apiKey",
      authDomain: "你的專案.firebaseapp.com",
      databaseURL: "https://你的專案-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "你的專案ID",
      storageBucket: "你的專案.firebasestorage.app",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:xxxxxxxx"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 資料庫路徑
    const timeRef = ref(db, "sharedTime");

    let currentBaseTime = null; // 例如 "14:30:00"
    let currentSetAt = null;    // 時間被設定時的時間戳 ms
    let timerId = null;

    const clockEl = document.getElementById("clock");
    const statusEl = document.getElementById("status");
    const timeInputEl = document.getElementById("timeInput");
    const updateBtn = document.getElementById("updateBtn");

    function parseHHMMSS(timeStr) {
      const parts = timeStr.split(":").map(Number);
      const h = parts[0] || 0;
      const m = parts[1] || 0;
      const s = parts[2] || 0;
      return { h, m, s };
    }

    function formatTime(dateObj) {
      const hh = String(dateObj.getHours()).padStart(2, "0");
      const mm = String(dateObj.getMinutes()).padStart(2, "0");
      const ss = String(dateObj.getSeconds()).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function startLocalClock(baseTime, setAt) {
      currentBaseTime = baseTime;
      currentSetAt = setAt;

      if (timerId) {
        clearInterval(timerId);
      }

      function updateDisplay() {
        const { h, m, s } = parseHHMMSS(currentBaseTime);

        // 建立「基準時間」
        const baseDate = new Date();
        baseDate.setHours(h, m, s, 0);

        // 算出從設定那刻到現在過了多久
        const elapsed = Date.now() - currentSetAt;

        // 用基準時間 + 經過時間 = 目前統一時間
        const currentDate = new Date(baseDate.getTime() + elapsed);

        clockEl.textContent = formatTime(currentDate);
      }

      updateDisplay();
      timerId = setInterval(updateDisplay, 200);
    }

    // 2. 監聽 Firebase 資料
    onValue(timeRef, (snapshot) => {
      const data = snapshot.val();

      if (!data) {
        clockEl.textContent = "--:--:--";
        statusEl.textContent = "目前尚未設定時間";
        return;
      }

      if (!data.baseTime || !data.setAt) {
        clockEl.textContent = "--:--:--";
        statusEl.textContent = "資料格式不完整";
        return;
      }

      startLocalClock(data.baseTime, data.setAt);
      statusEl.textContent = "已同步";
    }, (error) => {
      console.error(error);
      statusEl.textContent = "讀取失敗";
    });

    // 3. 按下按鈕後寫入新時間
    updateBtn.addEventListener("click", async () => {
      let value = timeInputEl.value;

      if (!value) {
        alert("請先輸入時間");
        return;
      }

      // input[type=time] 有時只會給 HH:MM，要補成 HH:MM:SS
      if (value.length === 5) {
        value += ":00";
      }

      try {
        await set(timeRef, {
          baseTime: value,
          setAt: Date.now()
        });

        statusEl.textContent = "更新成功";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "更新失敗";
      }
    });
  </script>
</body>
</html>
